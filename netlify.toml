# WaterApp Admin — root’taki Next.js 14 (App Router) uygulaması.
# Eski CRA admin (api/admin-dashboard/) artık bu siteyle deploy edilmiyor.
#
# Gerekli env (Netlify → Site settings → Environment variables):
#   Ya FIREBASE_SERVICE_ACCOUNT = service account JSON (tek satır / Netlify “secret”)
#   ya da FIREBASE_PROJECT_ID + FIREBASE_CLIENT_EMAIL + FIREBASE_PRIVATE_KEY
#     (çok satırlı private key: Netlify’da "Contains multiple values" veya \n kaçışlı tek satır)
#   NEXT_PUBLIC_FIREBASE_API_KEY, NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,
#   NEXT_PUBLIC_FIREBASE_PROJECT_ID, NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,
#   NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID, NEXT_PUBLIC_FIREBASE_APP_ID

[build]
  command = "npm run build"
  # Netlify varsayılanı publish'ı repo kökü yapıyor; bu da "base" ile aynı olunca
  # @netlify/plugin-nextjs v5 "publish directory cannot be the same as the base
  # directory" hatası veriyor. Build çıktısını açıkça .next veriyoruz
  # (netlify build sonrası .next vardır; eklenti bundan ileri taşır).
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"

[[plugins]]
  package = "@netlify/plugin-nextjs"
