# Admin dashboard (CRA). Hassas / ortam değişkenleri Netlify UI’da tutulur:
# Site settings → Environment variables → Build için:
#   REACT_APP_API_URL=https://waterappdashboard2.onrender.com
#   REACT_APP_PRODUCTION_API_URL=https://waterappdashboard2.onrender.com
# (api/admin-dashboard/.env.example ile aynı isimler)

[build]
  base = "api/admin-dashboard"
  publish = "build"
  command = "CI=false npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200