# WaterApp Admin — root’taki Next.js 14 (App Router) uygulaması.
# Eski CRA admin (api/admin-dashboard/) artık bu siteyle deploy edilmiyor.
#
# Tüm gizli değerler sadece Netlify UI (Environment variables) üzerinde.
# "Secret" işaretli bir env (ör. Firebase proje id) aynı metnin repoda
# (.firebaserc, README) geçmesine izin vermek için tarama dışı bırakılır;
# aksi halde build “exposed secrets” ile kesilir.

[build]
  command = "npm run build"
  # Netlify varsayılanı publish'ı repo kökü yapıyor; bu da "base" ile aynı olunca
  # @netlify/plugin-nextjs v5 "publish directory cannot be the same as the base
  # directory" hatası veriyor. Build çıktısını açıkça .next veriyoruz
  # (netlify build sonrası .next vardır; eklenti bundan ileri taşır).
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-audit --no-fund"
  # Proje id genelde public bilgidir; secret olarak işaretlendiyse repodaki
  # eşleşmeyi hata sayma (Netlify Secret Scanning).
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_PROJECT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"
